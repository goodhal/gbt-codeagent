# 代码安全审计规则配置
# 支持多语言、多漏洞类型的检测规则

version: "1.0"

# 标签描述定义
# 用于组织和管理检测规则的元数据
labelDescriptions:
  profile:
    default: "高质量标准检查，低误报率"
    sensitive: "默认检查 + 更全面的检查，低误报率"
    security: "针对潜在漏洞代码的检查，包含所有 SEI Cert 规则"
    portability: "检测平台差异带来的代码问题（如32位和64位架构）"
    extreme: "敏感检查 + 更全面的检查，可接受的误报率"
  severity:
    CRITICAL: "表示编译错误或会导致运行时错误的真正漏洞"
    HIGH: "真正漏洞表示源代码将导致运行时错误"
    MEDIUM: "真正漏洞表示源代码可能不会导致运行时错误（但违反直觉，容易出错）"
    LOW: "真正漏洞表示源代码难以阅读/理解或可轻松优化"
    INFO: "信息性发现，不一定是漏洞"
    UNSPECIFIED: "未指定严重级别"
  guideline:
    cwe-top-25-2024: "https://cwe.mitre.org/top25/"
    sei-cert-c: "https://wiki.sei.cmu.edu/confluence/display/c/SEI+CERT+C+Coding+Standard"
    sei-cert-cpp: "https://wiki.sei.cmu.edu/confluence/pages/viewpage.action?pageId=88046682"
    misra-c: "https://www.misra.org.uk/"
    memory-safety: "https://cwe.mitre.org/data/definitions/1399.html"
    owasp-top-10-2021: "https://owasp.org/Top10/2021/"
    gbt-34943: "GB/T 34943-2017 C/C++ 语言源代码漏洞测试规范"
    gbt-34944: "GB/T 34944-2017 Java 语言源代码漏洞测试规范"
    gbt-34946: "GB/T 34946-2017 C# 语言源代码漏洞测试规范"
    gbt-39412: "GB/T 39412-2020 网络安全技术 源代码漏洞检测规则"

# 支持的编程语言
supportedLanguages:
  - python
  - javascript
  - typescript
  - java
  - php
  - go
  - ruby
  - rust
  - cpp
  - csharp

# 污点追踪配置
taintTracking:
  # 污点源 - 用户输入点
  sources:
    python:
      - name: "User Input"
        patterns:
          - "input("
          - "sys.argv"
          - "os.environ"
          - "request.args"
          - "request.form"
          - "request.json"
        category: "user_input"
      - name: "File Read"
        patterns:
          - "open("
          - "file()"
          - "read()"
        category: "file_input"
      - name: "Network Input"
        patterns:
          - "requests.get"
          - "requests.post"
          - "urllib"
          - "http.client"
        category: "network_input"

    javascript:
      - name: "DOM Input"
        patterns:
          - "innerHTML"
          - "outerHTML"
          - "document.write"
          - "eval("
        category: "dom_input"
      - name: "User Input"
        patterns:
          - "prompt("
          - "confirm("
          - "fetch("
          - "XMLHttpRequest"
        category: "user_input"

    java:
      - name: "User Input"
        patterns:
          - "request.getParameter"
          - "request.getHeader"
          - "request.getInputStream"
        category: "user_input"
      - name: "Database"
        patterns:
          - "Statement.execute"
          - "ResultSet"
          - "PreparedStatement"
        category: "db_input"

    go:
      - name: "User Input"
        patterns:
          - "os.Args"
          - "fmt.Scan"
          - "bufio.NewReader"
          - "http.Request.Form"
          - "http.Request.PostForm"
        category: "user_input"
      - name: "Network Input"
        patterns:
          - "http.Get"
          - "http.Post"
          - "http.Client"
        category: "network_input"

    ruby:
      - name: "User Input"
        patterns:
          - "gets"
          - "ARGV"
          - "ENV"
          - "params"
          - "request.params"
        category: "user_input"
      - name: "File Read"
        patterns:
          - "File.read"
          - "File.open"
          - "IO.read"
        category: "file_input"

    rust:
      - name: "User Input"
        patterns:
          - "std::io::stdin"
          - "env::args"
          - "fs::read"
        category: "user_input"
      - name: "Network Input"
        patterns:
          - "reqwest::get"
          - "ureq::request"
        category: "network_input"

    cpp:
      - name: "User Input"
        patterns:
          - "cin>>"
          - "getline"
          - "scanf"
          - "gets"
          - "fgets"
        category: "user_input"
      - name: "File Read"
        patterns:
          - "ifstream"
          - "fstream"
          - "FILE"
        category: "file_input"

    csharp:
      - name: "User Input"
        patterns:
          - "Console.ReadLine"
          - "Request.QueryString"
          - "Request.Form"
          - "Request.Params"
        category: "user_input"
      - name: "Database"
        patterns:
          - "SqlCommand"
          - "SqlDataReader"
          - "ExecuteReader"
        category: "db_input"

  # 危险函数 - 污点汇
  sinks:
    python:
      - id: "SEC-CMD-001"
        name: "Command Execution"
        patterns:
          - "os.system"
          - "os.popen"
          - "subprocess.call"
          - "subprocess.Popen"
          - "subprocess.run"
          - "exec("
          - "eval("
        category: "command_exec"
        severity: "CRITICAL"
        profiles:
          - "security"
          - "default"
        guidelines:
          cwe: ["CWE-78"]
          owasp: ["A03:2021"]
          gbt: ["GB/T34944-6.1.1.6", "GB/T34943-6.1.1.6"]
        doc_url: "https://docs.gbt-codeagent.com/rules/command-injection"

      - id: "SEC-SQL-001"
        name: "SQL Execution"
        patterns:
          - "cursor.execute"
          - "cursor.executemany"
          - "connection.execute"
          - "Session.execute"
          - "raw("
        category: "sql_injection"
        severity: "HIGH"
        profiles:
          - "security"
          - "default"
        guidelines:
          cwe: ["CWE-89"]
          owasp: ["A03:2021"]
          gbt: ["GB/T34944-6.1.1.1", "GB/T34943-6.1.1.1", "GB/T34946-6.1.1.1"]
        doc_url: "https://docs.gbt-codeagent.com/rules/sql-injection"

      - id: "SEC-CODE-001"
        name: "Code Execution"
        patterns:
          - "eval("
          - "exec("
          - "compile("
        category: "code_injection"
        severity: "CRITICAL"
        profiles:
          - "security"
          - "default"
        guidelines:
          cwe: ["CWE-94"]
          owasp: ["A03:2021"]
          gbt: ["GB/T34944-6.1.1.3"]
        doc_url: "https://docs.gbt-codeagent.com/rules/code-injection"

      - id: "SEC-FILE-001"
        name: "File Operation"
        patterns:
          - "open("
          - "file_put_contents"
          - "shutil.copy"
          - "os.rename"
        category: "file_operation"
        severity: "MEDIUM"
        profiles:
          - "portability"
          - "default"
        guidelines:
          cwe: ["CWE-22"]
          gbt: ["GB/T34944-6.1.1.4"]
        doc_url: "https://docs.gbt-codeagent.com/rules/path-traversal"

      - id: "SEC-DES-001"
        name: "Deserialization"
        patterns:
          - "pickle.loads"
          - "yaml.load"
          - "marshal.loads"
          - "shelve"
        category: "deserialization"
        severity: "HIGH"
        profiles:
          - "security"
          - "default"
        guidelines:
          cwe: ["CWE-502"]
          owasp: ["A03:2021"]
          gbt: ["GB/T34944-6.1.1.7"]
        doc_url: "https://docs.gbt-codeagent.com/rules/deserialization"

    javascript:
      - id: "SEC-CODE-002"
        name: "Code Execution"
        patterns:
          - "eval("
