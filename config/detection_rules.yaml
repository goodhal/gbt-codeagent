          cwe: ["CWE-502"]
          owasp: ["A03:2021"]
          gbt: ["GB/T34946-6.1.1.7"]
        doc_url: "https://docs.gbt-codeagent.com/rules/deserialization"

  # 安全函数 - 净化器
  sanitizers:
    python:
      - name: "Input Validation"
        patterns:
          - "re.match"
          - "re.search"
          - "validate"
          - "is_valid"
        category: "validation"

      - name: "Output Encoding"
        patterns:
          - "html.escape"
          - "htmlspecialchars"
          - "markupsafe"
          - "bleach"
        category: "encoding"

      - name: "SQL Parameterization"
        patterns:
          - "execute.*\\?"
          - "execute.*%s"
          - "execute.*:\\w+"
          - "prepare("
        category: "sql_safe"

      - name: "Shell Escaping"
        patterns:
          - "shlex.quote"
          - "shlex.escape"
          - "subprocess.list2cmdline"
        category: "shell_safe"

    javascript:
      - name: "Output Encoding"
        patterns:
          - "textContent"
          - "innerText"
          - "encodeURIComponent"
          - "encodeURI"
        category: "encoding"

      - name: "DOM Safe Methods"
        patterns:
          - "createElement"
          - "createTextNode"
          - "appendChild"
          - "removeChild"
        category: "dom_safe"

    java:
      - name: "SQL Parameterization"
        patterns:
          - "PreparedStatement"
          - "\\?\\s*="
          - "setString"
          - "setInt"
        category: "sql_safe"

      - name: "XML Security"
        patterns:
          - "XMLConstants.FEATURE_SECURE_PROCESSING"
          - "setFeature.*SECURE_PROCESSING"
        category: "xml_safe"

    php:
      - name: "SQL Parameterization"
        patterns:
          - "mysqli_prepare"
          - "PDO::prepare"
          - "\\$stmt->execute"
          - "\\$pdo->prepare"
        category: "sql_safe"

      - name: "Output Encoding"
        patterns:
          - "htmlspecialchars"
          - "htmlentities"
          - "ENT_QUOTES"
          - "ENT_HTML5"
        category: "encoding"

      - name: "Shell Escaping"
        patterns:
          - "escapeshellarg"
          - "escapeshellcmd"
        category: "shell_safe"

      - name: "Path Security"
        patterns:
          - "basename"
          - "realpath"
          - "dirname"
          - "is_file"
          - "is_dir"
        category: "path_safe"

# 漏洞检测规则
detectionRules:
  sql_injection:
    description: "SQL 注入漏洞"
    cwe: "CWE-89"
    gbt: "GB/T34943-2017, GB/T34944-2017, GB/T34946-2017"
    languages:
      python:
        riskPatterns:
          - pattern: "execute\\s*\\([^)]*\\+[^)]*\\)"
            description: "字符串拼接的 SQL 查询"
          - pattern: "cursor\\.execute\\s*\\([^)]*format\\s*\\("
            description: "使用 format 的 SQL 查询"
          - pattern: "cursor\\.execute\\s*\\([^)]*%[^)]*\\)"
            description: "使用 % 格式化的 SQL 查询"
        safePatterns:
          - pattern: "execute\\s*\\([^,]+,\\s*\\[.*\\]\\)"
            description: "参数化查询"
          - pattern: "cursor\\.execute\\s*\\([^,]+,\\s*\\(.*\\)\\)"
            description: "参数化查询"
        severity: "HIGH"
        remediation: "使用参数化查询或 ORM"

      java:
        riskPatterns:
          - pattern: "Statement\\.executeQuery\\s*\\([^)]*\\+[^)]*\\)"
            description: "字符串拼接的 SQL 查询"
          - pattern: "createStatement\\(\\)\\.executeQuery\\s*\\([^)]*\\+"
            description: "直接拼接的 SQL"
        safePatterns:
          - pattern: "PreparedStatement"
            description: "预处理语句"
          - pattern: "\\?\\s*=\\s*.*set\\w+"
            description: "参数绑定"
        severity: "HIGH"
        remediation: "使用 PreparedStatement 参数化查询"

      javascript:
        riskPatterns:
          - pattern: "query\\s*\\([^)]*\\+[^)]*\\)"
            description: "字符串拼接的 SQL 查询"
        safePatterns:
          - pattern: "\\$in\\s*:\\s*\\["
            description: "MongoDB 参数化"
        severity: "HIGH"
        remediation: "使用参数化查询"

      php:
        riskPatterns:
          - pattern: "\\$_(GET|POST|REQUEST|COOKIE)\\s*\\[.*?\\].*?(?:SELECT|INSERT|UPDATE|DELETE)"
            description: "直接使用用户输入构造 SQL"
          - pattern: "mysql_query\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "mysql_query 字符串拼接"
          - pattern: "mysqli_query\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "mysqli_query 字符串拼接"
          - pattern: "pg_query\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "pg_query 字符串拼接"
        safePatterns:
          - pattern: "mysqli_prepare\\s*\\("
            description: "预处理语句"
          - pattern: "PDO::prepare\\s*\\("
            description: "PDO 预处理"
          - pattern: "\\$stmt\\s*=\\s*.*->execute\\s*\\("
            description: "参数化查询"
        severity: "HIGH"
        remediation: "使用参数化查询或 ORM"

      go:
        riskPatterns:
          - pattern: "db\\.Query\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "字符串拼接的 SQL 查询"
          - pattern: "db\\.Exec\\s*\\([^)]*fmt\\.Sprintf"
            description: "fmt.Sprintf 构造的 SQL"
        safePatterns:
          - pattern: "\\?\\s*"
            description: "参数占位符"
          - pattern: "\\$\\d+"
            description: "参数占位符"
        severity: "HIGH"
        remediation: "使用参数化查询，避免字符串拼接 SQL"

      ruby:
        riskPatterns:
          - pattern: "execute.*interpolate.*true"
            description: "启用了字符串插值的查询"
          - pattern: "find_by_sql\\s*\\([^)]*\\+"
            description: "字符串拼接的 SQL"
        safePatterns:
          - pattern: "where\\("
            description: "ActiveRecord 查询方法"
          - pattern: "\\?\\s*"
            description: "参数占位符"
        severity: "HIGH"
        remediation: "使用 ActiveRecord ORM，避免字符串拼接 SQL"

      rust:
        riskPatterns:
          - pattern: "sqlx::query\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "字符串拼接的 SQL 查询"
          - pattern: "rust-postgres.*execute\\s*\\([^)]*\\+"
            description: "字符串拼接的 SQL"
        safePatterns:
          - pattern: "\\?\\s*"
            description: "参数占位符"
          - pattern: "\\$\\d+"
            description: "参数占位符"
        severity: "HIGH"
        remediation: "使用参数化查询"

      cpp:
        riskPatterns:
          - pattern: "mysql_query\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "字符串拼接的 SQL 查询"
          - pattern: "sqlite3_exec\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "字符串拼接的 SQL"
        safePatterns:
          - pattern: "sqlite3_prepare"
            description: "预处理语句"
        severity: "HIGH"
        remediation: "使用预处理语句，避免字符串拼接 SQL"

      csharp:
        riskPatterns:
          - pattern: "SqlCommand\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "字符串拼接的 SQL 查询"
          - pattern: "ExecuteReader\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "字符串拼接的 SQL"
        safePatterns:
          - pattern: "SqlCommand.*@"
            description: "参数化查询"
          - pattern: "Using.*SqlParameter"
            description: "使用 SqlParameter"
        severity: "HIGH"
        remediation: "使用参数化查询，避免字符串拼接 SQL"

  command_injection:
    description: "命令注入漏洞"
    cwe: "CWE-78"
    gbt: "GB/T34943-2017, GB/T34944-2017"
    languages:
      python:
        riskPatterns:
          - pattern: "os\\.system\\s*\\([^)]*\\+"
            description: "os.system 字符串拼接"
          - pattern: "os\\.popen\\s*\\([^)]*\\+"
            description: "os.popen 字符串拼接"
          - pattern: "subprocess\\.(call|Popen|run)\\s*\\([^)]*shell\\s*=\\s*True"
            description: "启用 shell 的子进程调用"
          - pattern: "subprocess\\.(call|Popen|run)\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "子进程字符串拼接"
        safePatterns:
          - pattern: "subprocess\\.run\\s*\\([^,]+,\\s*shell\\s*=\\s*False"
            description: "禁用 shell 的子进程"
          - pattern: "shlex\\.quote\\s*\\("
            description: "使用 shlex.quote 转义"
        severity: "CRITICAL"
        remediation: "避免使用 shell=True，使用 shlex.quote 转义用户输入"

      java:
        riskPatterns:
          - pattern: "Runtime\\.exec\\s*\\([^)]*\\+[^)]*\\)"
            description: "Runtime.exec 字符串拼接"
          - pattern: "ProcessBuilder\\s*\\([^)]*\\+"
            description: "ProcessBuilder 字符串参数"
        safePatterns:
          - pattern: "new String\\[\\].*\\)"
            description: "数组形式参数"
        severity: "CRITICAL"
        remediation: "使用数组形式传递命令参数，避免字符串拼接"

      javascript:
        riskPatterns:
          - pattern: "child_process\\.exec\\s*\\([^)]*\\+"
            description: "child_process.exec 字符串拼接"
          - pattern: "exec\\s*\\(`.*\\${"
            description: "模板字符串注入"
        safePatterns:
          - pattern: "execFile\\s*\\("
            description: "使用 execFile 而非 exec"
          - pattern: "spawn\\s*\\([^,]+,\\s*\\["
            description: "数组形式参数"
        severity: "CRITICAL"
        remediation: "避免使用 exec，采用 spawn/execFile 数组参数形式"

      php:
        riskPatterns:
          - pattern: "system\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "system() 字符串拼接"
          - pattern: "exec\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "exec() 字符串拼接"
          - pattern: "shell_exec\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "shell_exec() 字符串拼接"
          - pattern: "passthru\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "passthru() 字符串拼接"
          - pattern: "popen\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "popen() 字符串拼接"
        safePatterns:
          - pattern: "escapeshellarg\\s*\\("
            description: "使用 escapeshellarg 转义"
          - pattern: "escapeshellcmd\\s*\\("
            description: "使用 escapeshellcmd 转义"
        severity: "CRITICAL"
        remediation: "使用 escapeshellarg/escapeshellcmd 转义用户输入"

      go:
        riskPatterns:
          - pattern: "exec\\.Command\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "exec.Command 字符串拼接"
        safePatterns:
          - pattern: "exec\\.Command\\s*\\([^,]+,[^)]*\\)"
            description: "数组形式参数"
        severity: "CRITICAL"
        remediation: "使用数组形式传递命令参数，避免字符串拼接"

      ruby:
        riskPatterns:
          - pattern: "system\\s*\\([^)]*\\+"
            description: "system() 字符串拼接"
          - pattern: "`.*#\\{"
            description: "反引号字符串插值"
        safePatterns:
          - pattern: "system\\s*\\(.*,\\s*\\[" 
            description: "数组形式参数"
        severity: "CRITICAL"
        remediation: "使用数组形式参数，避免字符串拼接"

      rust:
        riskPatterns:
          - pattern: "Command::new\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "Command::new 字符串拼接"
        safePatterns:
          - pattern: "Command::new\\s*\\([^)]*\\)\\s*\\.arg\\s*\\("
            description: "使用 arg 方法"
        severity: "CRITICAL"
        remediation: "使用 args 方法传递参数，避免字符串拼接"

      cpp:
        riskPatterns:
          - pattern: "system\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "system() 字符串拼接"
          - pattern: "popen\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "popen() 字符串拼接"
        safePatterns:
          - pattern: "execlp?\\s*\\([^,]+,\\s*\\[" 
            description: "数组形式参数"
        severity: "CRITICAL"
        remediation: "使用数组形式参数，避免字符串拼接"

      csharp:
        riskPatterns:
          - pattern: "Process\\.Start\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "Process.Start 字符串拼接"
          - pattern: "ProcessStartInfo\\.Arguments\\s*=\\s*[^;]*\\+"
            description: "Arguments 属性字符串拼接"
        safePatterns:
          - pattern: 'ProcessStartInfo\\.Arguments\\s*=\\s*\\"'
            description: "显式设置参数"
        severity: "CRITICAL"
        remediation: "显式设置 Arguments，避免字符串拼接"

  xss:
    description: "跨站脚本攻击 (XSS)"
    cwe: "CWE-79"
    gbt: "GB/T34946-2017"
    languages:
      javascript:
        riskPatterns:
          - pattern: "innerHTML\\s*=\\s*[^;]*\\+"
            description: "innerHTML 字符串拼接"
          - pattern: "outerHTML\\s*=\\s*[^;]*\\+"
            description: "outerHTML 字符串拼接"
          - pattern: "document\\.write\\s*\\("
            description: "document.write"
          - pattern: "insertAdjacentHTML"
            description: "insertAdjacentHTML"
        safePatterns:
          - pattern: "textContent\\s*="
            description: "使用 textContent"
          - pattern: "innerText\\s*="
            description: "使用 innerText"
          - pattern: "createTextNode"
            description: "使用 createTextNode"
          - pattern: "encodeURIComponent"
            description: "URL 编码"
        severity: "HIGH"
        remediation: "使用 textContent/innerText 而非 innerHTML，对用户输入进行编码"

      php:
        riskPatterns:
          - pattern: "echo\\s+\\$_(GET|POST|REQUEST|COOKIE)"
            description: "直接输出用户输入"
          - pattern: "print\\s+\\$_(GET|POST|REQUEST|COOKIE)"
            description: "直接输出用户输入"
        safePatterns:
          - pattern: "htmlspecialchars\\s*\\("
            description: "使用 htmlspecialchars"
          - pattern: "htmlentities\\s*\\("
            description: "使用 htmlentities"
        severity: "HIGH"
        remediation: "使用 htmlspecialchars 或 htmlentities 对输出进行编码"

      go:
        riskPatterns:
          - pattern: "html/template\\.HTML\\s*\\([^)]*\\+"
            description: "模板字符串拼接"
        safePatterns:
          - pattern: "template\\.HTML\\s*\\("
            description: "使用 template 包"
        severity: "HIGH"
        remediation: "使用 html/template 包的自动转义功能"

      ruby:
        riskPatterns:
          - pattern: "raw\\s*\\([^)]*\\+"
            description: "raw 输出未转义"
          - pattern: "html\\.raw\\s*\\([^)]*\\+"
            description: "html.raw 未转义"
        safePatterns:
          - pattern: "render.*html\\s*\\:"
            description: "使用 ERB 默认转义"
        severity: "HIGH"
        remediation: "使用 ERB 默认转义，避免 raw"

      csharp:
        riskPatterns:
          - pattern: "Response\\.Write\\s*\\([^)]*\\+"
            description: "Response.Write 字符串拼接"
          - pattern: "@Html\\.Raw\\s*\\([^)]*\\+"
            description: "@Html.Raw 未转义"
        safePatterns:
          - pattern: "@Model\\."
            description: "使用 Model 属性"
        severity: "HIGH"
        remediation: "使用 @Model 而非 @Html.Raw"

  path_traversal:
    description: "路径遍历漏洞"
    cwe: "CWE-22"
    languages:
      python:
        riskPatterns:
          - pattern: "open\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "字符串拼接的文件路径"
          - pattern: "os\\.path\\.join\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "路径拼接中的变量"
          - pattern: "os\\.path\\.join\\s*\\([^)]*request\\."
            description: "用户输入参与路径拼接"
        safePatterns:
          - pattern: "os\\.path\\.realpath\\s*\\("
            description: "使用 realpath 规范化"
          - pattern: "os\\.path\\.abspath\\s*\\("
            description: "使用 abspath 规范化"
          - pattern: "pathlib\\.Path\\([^)]*\\)\\.resolve\\("
            description: "使用 resolve 规范化"
        severity: "MEDIUM"
        remediation: "使用 Path.resolve() 规范化路径，验证路径在允许范围内"

      java:
        riskPatterns:
          - pattern: "new File\\s*\\([^)]*\\+"
            description: "字符串拼接的文件路径"
          - pattern: "FileInputStream\\s*\\([^)]*\\+"
            description: "文件输入流的字符串拼接"
        safePatterns:
          - pattern: "toRealPath"
            description: "使用 toRealPath 规范化"
          - pattern: "toPath\\(\\).*\\.normalize\\(\\)"
            description: "使用 normalize 规范化"
        severity: "MEDIUM"
        remediation: "使用 Path.normalize() 和 realPath() 规范化路径"

      php:
        riskPatterns:
          - pattern: "include\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "include 字符串拼接"
          - pattern: "require\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "require 字符串拼接"
          - pattern: "fopen\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "fopen 字符串拼接"
          - pattern: "file_get_contents\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "file_get_contents 字符串拼接"
          - pattern: "readfile\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "readfile 字符串拼接"
        safePatterns:
          - pattern: "basename\\s*\\("
            description: "使用 basename 提取文件名"
          - pattern: "realpath\\s*\\("
            description: "使用 realpath 规范化"
          - pattern: "is_file\\s*\\("
            description: "使用 is_file 验证"
        severity: "MEDIUM"
        remediation: "使用 realpath() 规范化路径，验证文件存在且在允许范围内"

      go:
        riskPatterns:
          - pattern: "ioutil\\.ReadFile\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "ioutil.ReadFile 字符串拼接"
          - pattern: "ioutil\\.WriteFile\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "ioutil.WriteFile 字符串拼接"
          - pattern: "os\\.Open\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "os.Open 字符串拼接"
        safePatterns:
          - pattern: "path\\.Clean\\s*\\("
            description: "使用 path.Clean 规范化"
          - pattern: "path\\.Join\\s*\\("
            description: "使用 path.Join 安全拼接"
        severity: "MEDIUM"
        remediation: "使用 path.Join 或 path.Clean 规范化路径"

      ruby:
        riskPatterns:
          - pattern: "File\\.open\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "File.open 字符串拼接"
          - pattern: "open\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "open 方法字符串拼接"
          - pattern: "read\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "read 方法字符串拼接"
        safePatterns:
          - pattern: "File\\.join\\s*\\("
            description: "使用 File.join 拼接"
          - pattern: "File\\.basename\\s*\\("
            description: "使用 File.basename 提取文件名"
        severity: "MEDIUM"
        remediation: "使用 File.join 拼接路径，避免字符串拼接"

      rust:
        riskPatterns:
          - pattern: "std::fs::read\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "std::fs::read 字符串拼接"
          - pattern: "std::fs::write\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "std::fs::write 字符串拼接"
          - pattern: "File::open\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "File::open 字符串拼接"
        safePatterns:
          - pattern: "std::path::Path\\.new\\s*\\("
            description: "使用 Path::new"
          - pattern: "Path::join\\s*\\("
            description: "使用 Path::join 拼接"
        severity: "MEDIUM"
        remediation: "使用 Path::join 拼接路径"

      cpp:
        riskPatterns:
          - pattern: "fopen\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "fopen 字符串拼接"
          - pattern: "ifstream\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "ifstream 字符串拼接"
          - pattern: "ofstream\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "ofstream 字符串拼接"
        safePatterns:
          - pattern: "realpath\\s*\\("
            description: "使用 realpath 规范化"
        severity: "MEDIUM"
        remediation: "使用 realpath 规范化路径"

      csharp:
        riskPatterns:
          - pattern: "File\\.Open\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "File.Open 字符串拼接"
          - pattern: "File\\.ReadAllText\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "File.ReadAllText 字符串拼接"
          - pattern: "File\\.WriteAllText\\s*\\([^)]*\\+\\s*[^)]*\\)"
            description: "File.WriteAllText 字符串拼接"
        safePatterns:
          - pattern: "Path\\.Combine\\s*\\("
            description: "使用 Path.Combine"
          - pattern: "Path\\.GetFullPath\\s*\\("
            description: "使用 Path.GetFullPath"
        severity: "MEDIUM"
        remediation: "使用 Path.Combine 拼接路径"

  deserialization:
    description: "不安全反序列化"
    cwe: "CWE-502"
    languages:
      python:
        riskPatterns:
          - pattern: "pickle\\.loads?\\s*\\("
            description: "pickle 反序列化"
          - pattern: "yaml\\.load\\s*\\([^)]*\\)"
            description: "不安全的 yaml.load"
          - pattern: "marshal\\.loads?\\s*\\("
            description: "marshal 反序列化"
        safePatterns:
