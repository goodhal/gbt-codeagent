# 框架特定规则
frameworkRules:
  django:
    name: "Django"
    languages:
      - python
    indicators:
      - "from django"
      - "import django"
      - "@app.route"
    specificVulnerabilities:
      - id: "django-sql-injection"
        description: "Django ORM 不安全使用"
        patterns:
          - "extra\\s*\\("
          - "raw\\s*\\("
          - ".objects\\.raw\\s*\\("
        remediation: "使用 Django ORM 的参数化查询"

      - id: "django-ssti"
        description: "模板注入"
        patterns:
          - "Template\\s*\\(\\s*request\\."
          - "render_to_string\\s*\\([^,]*request\\."
        remediation: "避免用户输入直接进入模板"

  express:
    name: "Express.js"
    languages:
      - javascript
    indicators:
      - "require\\s*\\(\\s*['\\\"]express['\\\"]\\)"
      - "from\\s+['\\\"]express['\\\"]"
    specificVulnerabilities:
      - id: "express-nosql-injection"
        description: "NoSQL 注入"
        patterns:
          - "findOne\\s*\\([^)]*\\+\\s*[^)]*\\)"
          - "findById\\s*\\([^)]*req\\."
        remediation: "验证和清理用户输入，使用参数化查询"

      - id: "express-route-traversal"
        description: "路由遍历"
        patterns:
          - "res\\.sendFile\\s*\\([^)]*\\+\\s*"
        remediation: "使用路径安全函数，避免用户控制的文件路径"

# 严重等级映射
severityLevels:
  CRITICAL:
    score: 9.5
    description: "危急漏洞，可导致系统完全被控"
  HIGH:
    score: 7.5
    description: "高危漏洞，可导致数据泄露或权限提升"
  MEDIUM:
    score: 5.0
    description: "中危漏洞，可导致部分功能受影响"
  LOW:
    score: 2.5
    description: "低危漏洞，潜在风险或代码质量问题"

# 分析选项
analysisOptions:
  maxLineLength: 10000
  maxFileSize: 10485760  # 10MB
  supportedExtensions:
    - ".py"
    - ".js"
    - ".ts"
    - ".jsx"
    - ".tsx"
    - ".java"
    - ".php"
    - ".go"
    - ".rb"
    - ".rs"
    - ".c"
    - ".cpp"
    - ".cs"

  csrf:
    description: "跨站请求伪造 (CSRF)"
    cwe: "CWE-352"
    languages:
      python:
        riskPatterns:
          - pattern: "@app\\.route.*methods.*POST"
            description: "POST路由缺少CSRF保护"
          - pattern: "session\\.get\\s*\\("
            description: "使用session但未验证CSRF"
        safePatterns:
          - pattern: "csrf_token"
            description: "CSRF token验证"
          - pattern: "CSRFProtect"
            description: "Flask-WTF CSRF保护"
        severity: "MEDIUM"
