express:
  name: Express.js
  languages:
    - javascript
  indicators:
    - require\s*\(\s*['\"]express['\"]\)
    - from\s+['\"]express['\"]
  specificVulnerabilities:
    - id: express-nosql-injection
      description: NoSQL 注入
      patterns:
        - findOne\s*\([^)]*\+\s*[^)]*\)
        - findById\s*\([^)]*req\.
      remediation: 验证和清理用户输入，使用参数化查询
    - id: express-route-traversal
      description: 路由遍历
      patterns:
        - res\.sendFile\s*\([^)]*\+\s*
      remediation: 使用路径安全函数，避免用户控制的文件路径
