$schema: ./rules-schema.yaml
language: php
taintTracking:
  sources: []
  sinks:
    - id: SEC-CMD-003
      name: Command Execution
      patterns:
        - system\(
        - exec\(
        - shell_exec\(
        - passthru\(
        - popen\(
        - proc_open\(
        - pcntl_exec\(
      category: command_exec
      severity: CRITICAL
      profiles:
        - security
        - default
      guidelines:
        cwe:
          - CWE-78
        owasp:
          - A03:2021
      doc_url: https://docs.gbt-codeagent.com/rules/command-injection
    - id: SEC-SQL-003
      name: SQL Execution
      patterns:
        - mysql_query\(
        - mysqli_query\(
        - pg_query\(
        - mysqli_real_query\(
      category: sql_injection
      severity: HIGH
      profiles:
        - security
        - default
      guidelines:
        cwe:
          - CWE-89
        owasp:
          - A03:2021
      doc_url: https://docs.gbt-codeagent.com/rules/sql-injection
    - id: SEC-CODE-003
      name: Code Execution
      patterns:
        - eval\(
        - assert\(
        - create_function\(
      category: code_injection
      severity: CRITICAL
      profiles:
        - security
        - default
      guidelines:
        cwe:
          - CWE-94
        owasp:
          - A03:2021
      doc_url: https://docs.gbt-codeagent.com/rules/code-injection
    - id: SEC-FILE-002
      name: File Operation
      patterns:
        - include\(
        - require\(
        - fopen\(
        - file_get_contents
        - file_put_contents
      category: file_operation
      severity: MEDIUM
      profiles:
        - portability
        - default
      guidelines:
        cwe:
          - CWE-22
      doc_url: https://docs.gbt-codeagent.com/rules/path-traversal
    - id: SEC-DES-002
      name: Deserialization
      patterns:
        - unserialize(
      category: deserialization
      severity: HIGH
      profiles:
        - security
        - default
      guidelines:
        cwe:
          - CWE-502
        owasp:
          - A03:2021
      doc_url: https://docs.gbt-codeagent.com/rules/deserialization
    - id: SEC-XXE-003
      name: XML Processing
      patterns:
        - simplexml_load_string
        - simplexml_load_file
        - DOMDocument.loadXML
      category: xxe
      severity: HIGH
      profiles:
        - security
        - default
      guidelines:
        cwe:
          - CWE-611
        owasp:
          - A03:2021
      doc_url: https://docs.gbt-codeagent.com/rules/xxe
