    - id: QS-PHP-828
      name: INFO LEAK
      patterns:
        - echo\s*\$.*password
      category: info_leak
      severity: MEDIUM
      profiles:
        - security
        - default
      guidelines:
        cwe:
          - CWE-532
      _quickScan: true
      _vulnType: INFO_LEAK
      _cwe: CWE-532
      _chineseSeverity: 中危
  sanitizers:
    - name: SQL Parameterization
      patterns:
        - mysqli_prepare
        - PDO::prepare
        - \$stmt->execute
        - \$pdo->prepare
      category: sql_safe
    - name: Output Encoding
      patterns:
        - htmlspecialchars
        - htmlentities
        - ENT_QUOTES
        - ENT_HTML5
      category: encoding
    - name: Shell Escaping
      patterns:
        - escapeshellarg
        - escapeshellcmd
      category: shell_safe
    - name: Path Security
      patterns:
        - basename
        - realpath
        - dirname
        - is_file
        - is_dir
      category: path_safe
