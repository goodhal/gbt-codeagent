$schema: ./rules-schema.yaml
language: python
taintTracking:
  sources:
    - name: User Input
      patterns:
        - input\(
        - sys\.argv
        - os\.environ
        - request\.args
        - request\.form
        - request\.json
        - request\.values
        - request\.data
        - request\.cookies
        - request\.headers
        - flask\.request
        - django\.request
      category: user_input
    - name: File Read
      patterns:
        - open\(
        - file\(
        - \.read\(
        - Path\(
        - Path\.open
      category: file_input
    - name: Network Input
      patterns:
        - requests\.get
        - requests\.post
        - requests\.request
        - urllib\.
        - http\.client
        - httpx\.
        - \.json\(\)
        - \.text\(\)
        - \.content\b
        - \.read\(\)
        - \.body
      category: network_input
    - name: Database Input
      patterns:
        - cursor\.fetch
        - query\(
        - get\(
        - filter\(
      category: db_input
  sinks:
