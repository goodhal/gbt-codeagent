      patterns:
        - os\.system
        - os\.popen
        - subprocess\.call
        - subprocess\.Popen
        - subprocess\.run
        - exec\(
        - eval\(
      category: command_exec
      severity: CRITICAL
      profiles:
        - security
        - default
      guidelines:
        cwe:
          - CWE-78
        owasp:
          - A03:2021
        gbt:
          - GB/T34944-6.1.1.6
          - GB/T34943-6.1.1.6
      doc_url: https://docs.gbt-codeagent.com/rules/command-injection
    - id: SEC-SQL-001
