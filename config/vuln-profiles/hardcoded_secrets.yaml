hardcoded_secrets:
  description: 硬编码凭据/密钥
  cwe: CWE-798
  languages:
    python:
      riskPatterns:
        - pattern: password\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码密码
        - pattern: api_key\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码 API Key
        - pattern: secret\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码密钥
        - pattern: token\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码 Token
      severity: HIGH
      remediation: 使用环境变量或安全的密钥管理服务
    javascript:
      riskPatterns:
        - pattern: const\s+(apiKey|api_key)\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码 API Key
        - pattern: const\s+password\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码密码
      severity: HIGH
      remediation: 使用环境变量或配置服务
    java:
      riskPatterns:
        - pattern: password\\s*=\\s*"[^"]+"
          description: 硬编码密码
        - pattern: apiKey\\s*=\\s*"[^"]+"
          description: 硬编码 API Key
        - pattern: secretKey\\s*=\\s*"[^"]+"
          description: 硬编码密钥
        - pattern: privateKey\\s*=\\s*"[^"]+"
          description: 硬编码私钥
      severity: HIGH
      remediation: 使用环境变量或密钥管理服务
    php:
      riskPatterns:
        - pattern: \$password\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码密码
        - pattern: \$apiKey\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码 API Key
        - pattern: \$secret\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码密钥
        - pattern: define\s*\(['\"](API_KEY|SECRET|PASSWORD)\s*,\s*['\"][^'\"]+['\"]
          description: 常量定义硬编码密钥
      severity: HIGH
      remediation: 使用环境变量或配置服务
    go:
      riskPatterns:
        - pattern: apiKey\\s*:=\\s*"[^"]+"
          description: 硬编码 API Key
        - pattern: password\\s*:=\\s*"[^"]+"
          description: 硬编码密码
        - pattern: secret\\s*:=\\s*"[^"]+"
          description: 硬编码密钥
        - pattern: token\\s*:=\\s*"[^"]+"
          description: 硬编码 Token
      severity: HIGH
      remediation: 使用环境变量或密钥管理服务
    ruby:
      riskPatterns:
        - pattern: api_key\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码 API Key
        - pattern: password\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码密码
        - pattern: secret_key\s*=\s*['\"][^'\"]+['\"]
          description: 硬编码密钥
      severity: HIGH
      remediation: 使用环境变量或 Rails credentials
    rust:
      riskPatterns:
        - pattern: api_key\\s*:\\s*"[^"]+"
          description: 硬编码 API Key
        - pattern: password\\s*:\\s*"[^"]+"
          description: 硬编码密码
        - pattern: secret\\s*:\\s*"[^"]+"
          description: 硬编码密钥
      severity: HIGH
      remediation: 使用环境变量或密钥管理服务
    cpp:
      riskPatterns:
        - pattern: const\\s+char\\s+\\*\\s*apiKey\\s*=\\s*"[^"]+"
          description: 硬编码 API Key
        - pattern: const\\s+char\\s+\\*\\s*password\\s*=\\s*"[^"]+"
          description: 硬编码密码
        - pattern: '#define\\s+API_KEY\\s+"[^"]+"'
          description: 宏定义硬编码密钥
      severity: HIGH
      remediation: 使用配置文件或环境变量
    csharp:
      riskPatterns:
        - pattern: private\\s+const\\s+string\\s+(ApiKey|apiKey|API_KEY)\\s*=\\s*"[^"]+"
          description: 硬编码 API Key
        - pattern: private\\s+const\\s+string\\s+Password\\s*=\\s*"[^"]+"
          description: 硬编码密码
        - pattern: private\\s+const\\s+string\\s+(Secret|secretKey|SECRET)\\s*=\\s*"[^"]+"
          description: 硬编码密钥
      severity: HIGH
      remediation: 使用配置文件或环境变量
